server:
  port: 8081

spring:
  profiles:
    active: local          # 加载 application-local.yaml（gitignored，存放真实Key）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/rag_campus?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root

  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-prefix: tb_

# ==================== DeepSeek API ====================
# 注册地址: https://platform.deepseek.com
deepseek:
  api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key}
  base-url: https://api.deepseek.com
  chat-model: deepseek-chat

# Embedding 服务配置
embedding:
  provider: ${EMBEDDING_PROVIDER:dashscope}          # dashscope / local
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:your-dashscope-api-key}
    base-url: https://dashscope.aliyuncs.com
    model: text-embedding-v3

# ==================== MinIO 对象存储 ====================
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: rag-campus-documents

# ==================== Office 预览转换 ====================
office:
  preview:
    enabled: true
    libreoffice-path: ${LIBREOFFICE_PATH:soffice}
    timeout-seconds: 60

# ==================== RAG 参数 ====================
rag:
  chunk:
    size: 800            # 每个chunk最大字符数（中文政策文档建议800-1000）
    overlap: 200         # 相邻chunk重叠字符数（size的25%）
  retrieval:
    top-k: 12            # 检索返回的最相关chunk数
    min-score: 0.55      # 检索最低分阈值
  conversation:
    max-history: 10      # Redis中保留的最近对话轮数
    ttl-hours: 24        # 对话过期时间（小时）
  vector:
    store: milvus         # memory | milvus（切换需重启）
  vision:
    enabled: true                             # 是否启用图片识别（扫描件OCR + 嵌入图片描述）
    model: qwen-vl-plus                       # 模型: qwen-vl-plus / qwen-vl-max
    max-images: 6                             # 每篇文档最多处理的图片数

# ==================== Milvus 向量数据库 ====================
milvus:
  host: localhost
  port: 19530
  database: default
  collection: rag_campus_chunks
  metric-type: COSINE
  dimension: 1024
  index-type: IVF_FLAT
  nlist: 128
  nprobe: 16

# ==================== JWT 认证 ====================
jwt:
  secret: ${JWT_SECRET:rag-campus-qa-default-secret-key-change-in-production}
  expiration: 86400000   # Token 过期时间（毫秒），默认 24 小时
