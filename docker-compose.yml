# ============================================================
# 校园智答 — 本地开发环境
# 启动: docker compose up -d
# 停止: docker compose down
# 清数据: docker compose down -v
# ============================================================

services:

  # ==================== MySQL 8.0 ====================
  mysql:
    image: mysql:8.0
    container_name: rag-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rag_campus
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis 7 ====================
  # 方案A: 基础 Redis（当前够用，镜像小）
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # 方案B: Redis Stack（含 RediSearch，后续向量检索升级用）
  # 切换方式：注释掉上面的 redis 服务，取消下面两行的注释
  # redis:
  #   image: redis/redis-stack:7.2.0-v13
  #   container_name: rag-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #     - "8001:8001"     # RedisInsight 可视化管理界面
  #   volumes:
  #     - redis-data:/data
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5

  # ==================== RabbitMQ 3.12 ====================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rag-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"       # AMQP 协议端口
      - "15672:15672"     # Web 管理界面
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== MinIO（对象存储，保存原始上传文件） ====================
  minio:
    image: minio/minio:latest
    container_name: rag-minio
    restart: unless-stopped
    ports:
      - "9000:9000"       # S3 API
      - "9001:9001"       # Web 控制台
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Milvus 向量数据库 ====================
  # Milvus 2.4 standalone 模式，依赖 etcd（元数据）+ MinIO（对象存储）
  # 启动: docker compose --profile milvus up -d
  # 非 Milvus 模式（默认内存向量）略过此组服务

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: rag-etcd
    restart: unless-stopped
    profiles: ["milvus"]
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: rag-milvus-minio
    restart: unless-stopped
    profiles: ["milvus"]
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus-minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: rag-milvus
    restart: unless-stopped
    profiles: ["milvus"]
    depends_on:
      etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"     # gRPC 端口
      - "9091:9091"       # 健康检查 / metrics
    command: ["milvus", "run", "standalone"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Milvus 可视化管理界面 Attu
  attu:
    image: zilliz/attu:v2.4
    container_name: rag-attu
    restart: unless-stopped
    profiles: ["milvus"]
    depends_on:
      milvus:
        condition: service_healthy
    ports:
      - "8002:3000"       # Web 界面: http://localhost:8002
    environment:
      MILVUS_URL: milvus:19530

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  minio-data:
  etcd-data:
  milvus-minio-data:
  milvus-data:
